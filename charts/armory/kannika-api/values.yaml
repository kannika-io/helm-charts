image:
  repository: quay.io/kannika/kannika-api
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "0.17.0"
imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""
# The amount of replicas to deploy
# The API server is not designed to be scaled horizontally, so it can only be set to 0 or 1
replicaCount: 1
# The values below are used in the Kubernetes Service
service:
  enabled: true
  type: ClusterIP
  port: 8080 # port that the service will expose
  targetPort: 8080 # container port
  annotations: {}
  labels: {}
# The values below are used in the Kubernetes Service for the Event Gateway
# The Event Gateway is a separate service of the API that is used to ingest events from other components
eventGateway:
  enabled: true
  service:
    name: "event-gateway"
    type: ClusterIP
    port: 8082 # port that the service will expose
    targetPort: 8082 # container port
    annotations: {}
    labels: {}
# Persistence settings for the API server's data directory.
# The data directory is configured by the application setting `config.data.directory` (default: /var/lib/kannika).
# By default, an emptyDir volume is used, which is deleted when the pod is deleted.
# If you want to use a PersistentVolumeClaim, set `persistentVolume.enabled` to true.
# If you want to use a hostPath, set `storage.hostPath` to the path on the host.
storage:
  # Store data on the host using this absolute path.
  # This is useful for development and testing, but not recommended for production.
  hostPath: ""
  # Store data using a PersistentVolumeClaim.
  persistentVolume:
    # Whether to use a PersistentVolumeClaim to store data.
    # Enabling this will take precedence over the other settings.
    enabled: false
    # The size of the PersistentVolumeClaim.
    size: 5Gi
    # The storage class to use for the PersistentVolumeClaim.
    # If not set, the default storage class will be used.
    storageClass: ""
    labels: {}
    annotations: {}
    accessModes:
      - ReadWriteOnce
    # Used to overwrite the default name of the PersistentVolumeClaim
    nameOverwrite: ""
# Application settings
config:
  kubernetes:
    # This will be removed in 0.13. Use `global.kubernetes.namespace` instead.
    namespace: ""
  security:
    enabled: true
    # Basic authentication configuration.
    basicAuth:
      enabled: true
      username: ""
      password: ""
    # Deprecated: use basicAuth.username and basicAuth.password instead.
    # Setting username here implies basicAuth.enabled=true for backwards compatibility.
    username: ""
    password: ""
    # Secret configuration:
    # - `create`: when true the chart creates the Secret (default: true for backwards compatibility).
    # - `name`: optional name to use for the created Secret. If empty, the chart uses the release resource name.
    # - `usernameKey` / `passwordKey`: keys used inside the Secret (defaults preserve current keys).
    secret:
      create: true
      name: ""
      usernameKey: "username"
      passwordKey: "password"
    oidc:
      issuerUri: ""
      audience: ""
      principalClaimName: ""
  # The Service to call for information about the operator
  operatorService:
    # Whether the API should call the Service
    enabled: false
    # The name of the Service to call
    name: kannika-operator
    # The namespace of the Service to call
    namespace: ""
    # The port of the Service to call
    port: 8080
  backup:
    metrics:
      scrape:
        # Periodic persistence of scraped pod metrics to the database.
        # When enabled, the API periodically saves metrics collected by scrape workers to the database.
        # This ensures the database has recent data to fall back on when the in-memory cache expires,
        # preventing gaps in reported backup topic metrics after API restarts or cache evictions.
        persist:
          # Whether to enable periodic persistence of scraped metrics.
          # When disabled, scraped metrics are only held in the in-memory cache and lost on restart.
          enabled: true
          # How often scraped metrics are persisted to the database.
          # Lower values keep the database more up-to-date but increase write load.
          # The first scrape after startup always persists immediately, regardless of this interval.
          interval: "5m"
        # Whether to start scrape workers for all discovered backup pods on API startup.
        # When enabled, the API proactively scrapes metrics from all running backup pods
        # immediately after starting, so the cache is warm before the first query arrives.
        # When disabled, scrape workers only start when a metrics query triggers a cache miss.
        onStartup: true
  data:
    # Directory where the API server stores cached data
    # Defaults to /var/lib/kannika
    directory: "/var/lib/kannika"
serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the name template
  name: ""
  clusterRbac:
    # Specifies whether cluster-wide RBAC resources should be created for this service account
    create: false
  rbac:
    # Specifies whether namespaced RBAC resources should be created for this service account
    create: true
podAnnotations: {}
podSecurityContext: {}
# fsGroup: 2000

securityContext: {}
#  capabilities:
#    drop:
#      - ALL
#  readOnlyRootFilesystem: true
#  runAsNonRoot: true
#  runAsUser: 1001011234
#  allowPrivilegeEscalation: false
#  seccompProfile:
#    type: RuntimeDefault

resources: {}
# limits:
#   cpu: 100m
#   memory: 128Mi
# requests:
#   cpu: 100m
#   memory: 128Mi

nodeSelector: {}
tolerations: []
affinity: {}
volumes:
volumeMounts: []
configMaps: {}
global:
  logging:
    format: "json"
    level: "info"
  imagePullSecrets: []
  kubernetes:
    # Namespace where the Kannika Armory resources live (e.g. kannika-data).
    # If not set, the `default` namespace will be used.
    # NOTE: This is **not** the namespace where the Kannika Armory components are installed (e.g. kannika-system).
    namespace: ""
  # Maintenance mode configuration.
  maintenance:
    # Whether maintenance mode is enabled.
    # When enabled, the operator will stop reconciling backups and restores.
    enabled: false
    # Banner configuration.
    # The banner is displayed to users to communicate maintenance status.
    # The banner is shown regardless of whether maintenance mode is enabled.
    banner:
      # The message to display. Leave unset to hide the banner.
      message:
      # The severity of the banner. Can be "warning", "info", or "error".
      variant: "info"
extraEnv: []
